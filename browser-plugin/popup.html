<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: #333;
    background: #fff;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid #e5e5e5;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .actions { display: flex; gap: 6px; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: none;
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00734a, #7aba47);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-ghost {
    background: none; color: #616975; border: 1px solid #d1d6e3;
  }
  .btn-ghost:hover { background: #f5f6f7; }

  .status {
    padding: 14px 16px; text-align: center; color: #8c94a3;
    min-height: 80px; display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 8px;
  }
  .status .icon { font-size: 28px; }

  .summary {
    display: flex; gap: 8px; padding: 12px 16px;
    border-bottom: 1px solid #e5e5e5;
  }
  .badge {
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .badge-error { background: #fee2d9; color: #c85535; }
  .badge-warning { background: #ffedd2; color: #b06900; }
  .badge-pass { background: #c7e8d9; color: #005730; }
  .badge-info { background: #d4e5f0; color: #174a6b; }

  .results {
    max-height: 300px; overflow-y: auto; padding: 4px 0;
  }
  .result-row {
    padding: 8px 16px; border-bottom: 1px solid #f5f6f7;
  }
  .result-row .tag {
    font-size: 10px; color: #8c94a3; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-row .selector {
    font-size: 11px; color: #1f2129; font-family: monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 2px 0;
  }
  .result-row .msgs {
    font-size: 11px; color: #616975; line-height: 1.4;
  }
  .result-row .msgs .err { color: #c85535; }
  .result-row .msgs .warn { color: #b06900; }
</style>
</head>
<body>
  <div class="header">
    <h1>Design Lint</h1>
    <div class="actions">
      <button class="btn btn-ghost" id="clear">Clear</button>
      <button class="btn btn-primary" id="scan">Scan</button>
    </div>
  </div>
  <div id="content">
    <div class="status">
      <div class="icon">🔍</div>
      <div>Click <b>Scan</b> to check the current page<br/>against DoktorABC design tokens.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
